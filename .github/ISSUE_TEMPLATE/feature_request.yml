name: Feature request
description: Suggest an idea for Echo
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Echo is intentionally **free, fully local, and desktop-only** — no accounts,
        billing, team features, or mobile. Please keep requests within that scope.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that Echo doesn't support today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
